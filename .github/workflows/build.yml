name: Build Player Runner

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Build Repo
        uses: actions/checkout@v4

      - name: Initialize engine dependencies
        run: |
          git clone --depth 1 -b release https://github.com/FongMi/TV.git engine_core

      - name: Apply runner configurations
        run: |
          python3 patch_sources.py

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Generate Signing Keystore
        run: |
          keytool -genkey -v -keystore key.jks -alias key -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=FongMi, OU=TV, O=TV, L=TV, S=TV, C=CN" -storepass password -keypass password
          mv key.jks engine_core/

      - name: Write local.properties
        run: |
          echo "storeFile=../key.jks" > engine_core/local.properties
          echo "keyAlias=key" >> engine_core/local.properties
          echo "storePassword=password" >> engine_core/local.properties

      - name: Compile runner targets
        working-directory: engine_core
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleMobileArm64_v8aRelease :app:assembleMobileArmeabi_v7aRelease :app:assembleLeanbackArm64_v8aRelease :app:assembleLeanbackArmeabi_v7aRelease --no-daemon

      - name: Verify binary outputs
        run: |
          ls -R engine_core/Release/apk/

      - name: Publish runner release
        run: |
          cd engine_core/Release/apk/
           # Remove any existing release tag to avoid conflicts
          gh release delete v0.9.4 --repo ${{ github.repository }} -y || true
          git push --delete origin v0.9.4 || true
          
          gh release create v0.9.4 *.apk \
            --repo ${{ github.repository }} \
            --title "Runner Release v0.9.4" \
            --notes "Automated release of personal test runner executables."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
